<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Sunclass Cargo Reconciler</title>
<style>
  :root {
    /* Dark (default) — same palette as TCOBuddy */
    --bg: #0a0a0f;
    --bg-elev: #1c1c27;
    --card: #13131a;
    --line: rgba(255,255,255,0.09);
    --line-hi: rgba(255,255,255,0.22);
    --text: #f0f0f5;
    --text-dim: rgba(240,240,245,0.55);
    --hint: rgba(240,240,245,0.3);
    --accent: #4f8fff;
    --accent-dim: rgba(79,143,255,0.15);
    --on-accent: #ffffff;
    --success: #3ecf8e;
    --success-bg: rgba(62,207,142,0.12);
    --error: #ff5c5c;
    --error-bg: rgba(255,92,92,0.14);
    --catering: #f5a623;
    --catering-bg: rgba(245,166,35,0.14);
    --cargo: #4f8fff;
    --cargo-bg: rgba(79,143,255,0.14);
    --mail: #c586ff;
    --mail-bg: rgba(197,134,255,0.14);
    --field-bg: #1c1c27;
    --field-border: rgba(255,255,255,0.14);
    --tile-bg: #17171f;
    --chip-bg: rgba(255,255,255,0.07);
    --radius: 10px;
  }

  @media (prefers-color-scheme: light) {
    :root {
      /* Light — same palette as TCOBuddy's "light" (ex-Aviator) theme */
      --bg: #f0f3f1;
      --bg-elev: #e8edea;
      --card: #ffffff;
      --line: rgba(20,40,80,0.12);
      --line-hi: rgba(20,40,80,0.3);
      --text: #142850;
      --text-dim: rgba(20,40,80,0.6);
      --hint: rgba(20,40,80,0.32);
      --accent: #142850;
      --accent-dim: rgba(20,40,80,0.08);
      --on-accent: #ffffff;
      --success: #1e6644;
      --success-bg: rgba(30,102,68,0.1);
      --error: #b83232;
      --error-bg: rgba(184,50,50,0.1);
      --catering: #8a6200;
      --catering-bg: rgba(138,98,0,0.1);
      --cargo: #1a6ef5;
      --cargo-bg: rgba(26,110,245,0.1);
      --mail: #7c3aed;
      --mail-bg: rgba(124,58,237,0.1);
      --field-bg: #ffffff;
      --field-border: rgba(20,40,80,0.18);
      --tile-bg: #f5f7f5;
      --chip-bg: rgba(20,40,80,0.06);
    }
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html { -webkit-text-size-adjust: 100%; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 0 0 90px 0;
    line-height: 1.35;
  }

  .mono { font-variant-numeric: tabular-nums; font-family: "SF Mono", "Menlo", "Consolas", monospace; }

  /* ---------- Top bar ---------- */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 30;
    background: color-mix(in srgb, var(--bg) 96%, transparent);
    backdrop-filter: blur(6px);
    border-bottom: 1px solid var(--line);
    padding: 10px 14px 10px;
  }
  .topbar h1 {
    margin: 0 0 10px 0;
    font-size: 17px;
    letter-spacing: 0.2px;
    font-weight: 700;
    color: var(--text);
  }
  .topbar h1 span { color: var(--accent); }

  .ac-toggle {
    display: flex;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 3px;
    gap: 3px;
  }
  .ac-btn {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-weight: 700;
    font-size: 13px;
    padding: 10px 6px;
    border-radius: 8px;
    min-height: 40px;
  }
  .ac-btn.active {
    background: var(--accent);
    color: var(--on-accent);
  }

  /* ---------- Summary / nav strip ---------- */
  .summary-strip {
    position: sticky;
    top: 65px;
    z-index: 20;
    background: color-mix(in srgb, var(--bg) 96%, transparent);
    border-bottom: 1px solid var(--line);
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .grand-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; }
  .hold-nav {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    flex: 1;
  }
  .hold-nav::-webkit-scrollbar { display: none; }
  .nav-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    color: var(--text);
    font-size: 12px;
    font-weight: 600;
    padding: 7px 10px;
    border-radius: 999px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .nav-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--error); flex-shrink: 0; }
  .nav-dot.match { background: var(--success); }
  .nav-dot.empty { background: var(--line-hi); }

  /* ---------- Main / cards ---------- */
  main {
    max-width: 640px;
    margin: 0 auto;
    padding: 14px 12px 0;
  }

  .hold-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 16px;
    scroll-margin-top: 120px;
  }

  .hold-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 2px;
  }
  .hold-head h2 {
    margin: 0;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.3px;
    color: var(--text);
  }
  .hold-note {
    margin: 2px 0 12px 0;
    font-size: 11.5px;
    color: var(--text-dim);
    font-style: italic;
  }

  .status-badge {
    padding: 4px 9px;
    border-radius: 6px;
    font-size: 11.5px;
    font-weight: 800;
    white-space: nowrap;
  }
  .match { background: rgba(53,208,127,0.18); color: var(--success); border: 1px solid rgba(53,208,127,0.4); }
  .mismatch { background: rgba(255,92,92,0.14); color: var(--error); border: 1px solid rgba(255,92,92,0.35); }
  .empty-badge { background: transparent; color: var(--text-dim); border: 1px solid var(--line); }

  .target-row {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px 10px;
    margin-bottom: 12px;
  }
  .target-row label {
    display: block;
    font-size: 10.5px;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 5px;
  }

  input[type="number"], input[type="text"] {
    width: 100%;
    background: var(--field-bg);
    border: 1px solid var(--field-border);
    color: var(--text);
    padding: 10px 10px;
    border-radius: 7px;
    font-size: 16px; /* prevents iOS zoom-on-focus */
    font-weight: 600;
  }
  input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 2px var(--accent-dim); }
  input::placeholder { color: var(--hint); font-weight: 400; }

  .tiles-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(128px, 1fr));
    gap: 9px;
  }

  .tile {
    background: var(--tile-bg);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 8px;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .tile.type-catering { border-color: var(--catering); background: color-mix(in srgb, var(--catering) 14%, var(--card)); }
  .tile.type-cargo { border-color: var(--cargo); background: color-mix(in srgb, var(--cargo) 14%, var(--card)); }
  .tile.type-mail { border-color: var(--mail); background: color-mix(in srgb, var(--mail) 14%, var(--card)); }

  .tile-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 4px;
    margin-bottom: 5px;
  }
  .tile label {
    font-size: 10.5px;
    font-weight: 800;
    color: var(--text-dim);
    letter-spacing: 0.2px;
  }
  .tile.type-catering label { color: var(--catering); }
  .tile.type-cargo label { color: var(--cargo); }
  .tile.type-mail label { color: var(--mail); }

  .chip {
    font-size: 9.5px;
    color: var(--text-dim);
    background: var(--chip-bg);
    padding: 2px 5px;
    border-radius: 4px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .tile.type-catering .chip { color: var(--catering); background: color-mix(in srgb, var(--catering) 22%, var(--card)); }

  .tile input { padding: 8px; font-size: 15px; margin-bottom: 6px; }
  .tile.type-catering input { background: color-mix(in srgb, var(--catering) 20%, var(--card)); color: var(--catering); font-weight: 700; }

  .mode-seg {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 3px;
  }
  .mode-btn {
    background: var(--chip-bg);
    border: 1px solid var(--field-border);
    color: var(--text-dim);
    font-size: 10px;
    font-weight: 700;
    padding: 7px 2px;
    border-radius: 5px;
    min-height: 30px;
  }
  .mode-btn.active { background: var(--accent); color: var(--on-accent); border-color: var(--accent); }
  .tile.type-catering .mode-btn[data-mode="catering"].active { background: var(--catering); border-color: var(--catering); color: var(--on-accent); }
  .tile.type-cargo .mode-btn[data-mode="cargo"].active { background: var(--cargo); border-color: var(--cargo); color: var(--on-accent); }
  .tile.type-mail .mode-btn[data-mode="mail"].active { background: var(--mail); border-color: var(--mail); color: var(--on-accent); }

  /* gauge */
  .gauge-wrap { margin-top: 12px; }
  .gauge-labels {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .gauge {
    position: relative;
    height: 8px;
    background: var(--chip-bg);
    border-radius: 5px;
    overflow: hidden;
    border: 1px solid var(--line);
  }
  .gauge-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 0%;
    background: var(--accent);
    border-radius: 5px 0 0 5px;
    transition: width 0.2s ease, background 0.2s ease;
  }
  .gauge-fill.over { background: var(--error); }
  .gauge-fill.match { background: var(--success); }
  .gauge-target-mark {
    position: absolute;
    top: -2px; bottom: -2px;
    width: 2px;
    background: var(--text);
    left: 100%;
  }

  /* bottom bar */
  .bottombar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: color-mix(in srgb, var(--bg) 96%, transparent);
    border-top: 1px solid var(--line);
    backdrop-filter: blur(6px);
    padding: 10px 14px;
    display: flex;
    justify-content: center;
    z-index: 30;
  }
  .clear-btn {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    color: var(--text-dim);
    font-size: 13px;
    font-weight: 700;
    padding: 10px 18px;
    border-radius: 8px;
    max-width: 640px;
    width: 100%;
  }
  .clear-btn:active { background: var(--field-bg); color: var(--text); }
  .bottombar-row { display: flex; gap: 8px; max-width: 640px; width: 100%; margin: 0 auto; }
  .bottombar-row .clear-btn { flex: 1; }
  .cpm-launch-btn { background: var(--accent); border-color: var(--accent); color: var(--on-accent); }
  .cpm-launch-btn:active { filter: brightness(0.9); color: var(--on-accent); }

  @media (min-width: 480px) {
    .tiles-grid { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
  }

  /* ---------- CPM modal ---------- */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.62);
    z-index: 50;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px 16px 0 0;
    width: 100%;
    max-width: 640px;
    max-height: 92vh;
    overflow-y: auto;
    padding: 16px 16px calc(20px + env(safe-area-inset-bottom));
  }
  @media (min-width: 640px) {
    .modal-overlay { align-items: center; }
    .modal-card { border-radius: 14px; margin: 20px; max-height: 90vh; max-width: 720px; }
  }
  @media (min-width: 900px) {
    .modal-card { max-width: 780px; padding: 24px 28px calc(24px + env(safe-area-inset-bottom)); }
  }

  .modal-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .modal-head h3 { margin: 0; font-size: 16px; font-weight: 800; }
  .modal-close {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    color: var(--text-dim);
    font-size: 15px;
    line-height: 1;
    padding: 8px 11px;
    border-radius: 8px;
  }

  .field { margin-bottom: 12px; }
  .field label {
    display: block;
    font-size: 10.5px;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 5px;
  }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  textarea {
    width: 100%;
    background: var(--field-bg);
    border: 1px solid var(--field-border);
    color: var(--text);
    padding: 10px;
    border-radius: 7px;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
  }
  #cpm-si { resize: none;
  }
  textarea:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 2px var(--accent-dim); }
  #cpm-raw { font-family: "SF Mono", "Menlo", "Consolas", monospace; font-size: 12.5px; min-height: 190px; }

  .check-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12.5px;
    color: var(--text-dim);
    margin-bottom: 14px;
    font-weight: 600;
  }
  .check-row input { width: auto; }

  .uld-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 6px; }
  .uld-row { background: var(--tile-bg); border: 1px solid var(--line); border-radius: 8px; padding: 8px; }
  .uld-row-head {
    display: flex;
    justify-content: space-between;
    font-size: 11.5px;
    font-weight: 800;
    margin-bottom: 6px;
  }
  .uld-row-head .meta { color: var(--text-dim); font-weight: 600; }
  .uld-row-inputs { display: grid; grid-template-columns: 1fr 1.4fr; gap: 6px; }
  .uld-row input { padding: 8px; font-size: 14px; text-transform: uppercase; }
  .uld-empty { font-size: 12.5px; color: var(--text-dim); font-style: italic; padding: 8px 0 16px; }

  .primary-btn {
    background: var(--accent);
    color: var(--on-accent);
    border: none;
    font-weight: 800;
    font-size: 14px;
    padding: 13px;
    border-radius: 8px;
    width: 100%;
    min-height: 46px;
  }
  .secondary-btn {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    color: var(--text);
    font-weight: 700;
    font-size: 13px;
    padding: 11px;
    border-radius: 8px;
    min-height: 46px;
  }
  .btn-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .btn-row > button { flex: 1; }

  .readable-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 6px; }
  .readable-table th, .readable-table td { text-align: left; padding: 6px 5px; border-bottom: 1px solid var(--line); }
  .readable-table th { color: var(--text-dim); font-size: 9.5px; text-transform: uppercase; letter-spacing: 0.3px; }
  .cpm-legend { font-size: 10.5px; color: var(--text-dim); margin: -4px 0 12px 0; }
  .cpm-total { font-size: 11.5px; color: var(--text-dim); margin: -2px 0 14px 0; }

  .copy-feedback {
    font-size: 11.5px;
    color: var(--success);
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.2s ease;
    text-align: center;
    flex: 1;
  }
  .copy-feedback.show { opacity: 1; }

  /* ---------- Custom calendar picker ---------- */
  .date-trigger {
    width: 100%;
    background: var(--field-bg);
    border: 1px solid var(--field-border);
    color: var(--text);
    padding: 10px 10px;
    border-radius: 7px;
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: space-between;
    text-align: left;
    min-height: 42px;
  }
  .date-trigger:active,
  .date-trigger.open { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-dim); }
  #cpm-date-display.placeholder { color: var(--hint); font-weight: 400; }
  .date-icon { font-size: 14px; opacity: 0.8; }

  .calendar-pop {
    display: none;
    position: fixed;
    z-index: 60;
    width: 280px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px;
    box-shadow: 0 10px 28px rgba(0,0,0,0.4);
  }
  .calendar-pop.open { display: block; }

  .cal-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .cal-head span { font-size: 12.5px; font-weight: 800; color: var(--text); }
  .cal-nav {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    color: var(--text);
    font-size: 15px;
    line-height: 1;
    width: 30px;
    height: 30px;
    border-radius: 6px;
  }

  .cal-dow {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    margin-bottom: 4px;
  }
  .cal-dow span {
    text-align: center;
    font-size: 9.5px;
    font-weight: 700;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    margin-bottom: 8px;
  }
  .cal-day {
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 12.5px;
    font-weight: 600;
    padding: 7px 0;
    border-radius: 6px;
    min-height: 32px;
  }
  .cal-day:hover { background: var(--bg-elev); }
  .cal-day.muted { color: var(--hint); }
  .cal-day.today { border: 1px solid var(--accent); }
  .cal-day.selected { background: var(--accent); color: var(--on-accent); font-weight: 800; }

  .cal-today {
    width: 100%;
    background: var(--bg-elev);
    border: 1px solid var(--line);
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    padding: 8px;
    border-radius: 7px;
  }
</style>
</head>
<body>

<header class="topbar">
  <h1><span>Sunclass</span> Cargo Reconciler</h1>
  <div class="ac-toggle">
    <button class="ac-btn active" id="btn-A390" onclick="switchAircraft('A390')">A330-900 · A390</button>
    <button class="ac-btn" id="btn-A333" onclick="switchAircraft('A333')">A330-300 · A333</button>
  </div>
</header>

<div class="summary-strip">
  <span class="grand-label">Total</span>
  <span id="grand-status" class="status-badge empty-badge">—</span>
  <div class="hold-nav" id="hold-nav"></div>
</div>

<main id="holds-root"></main>

<div class="bottombar">
  <div class="bottombar-row">
    <button class="clear-btn" onclick="clearAll()">Clear all</button>
    <button class="clear-btn cpm-launch-btn" onclick="openCpmModal()">Generate CPM</button>
  </div>
</div>

<div class="modal-overlay" id="cpm-overlay">
  <div class="modal-card">
    <div class="modal-head">
      <h3>Generate CPM</h3>
      <button class="modal-close" onclick="closeCpmModal()">✕</button>
    </div>

    <div id="cpm-form-view">
      <div class="field-row">
        <div class="field">
          <label>Flight number</label>
          <input type="text" id="cpm-flight" placeholder="e.g. DK1234">
        </div>
        <div class="field">
          <label>Registration</label>
          <input type="text" id="cpm-reg" placeholder="e.g. OY-VKG">
        </div>
      </div>
      <div class="field-row">
        <div class="field" style="position:relative;">
          <label>Date</label>
          <button type="button" class="date-trigger" id="cpm-date-trigger" onclick="toggleCalendar()">
            <span id="cpm-date-display" class="placeholder">Select date</span>
            <span class="date-icon">📅</span>
          </button>
          <div class="calendar-pop" id="cpm-calendar">
            <div class="cal-head">
              <button type="button" class="cal-nav" onclick="calShiftMonth(-1)">‹</button>
              <span id="cal-month-label"></span>
              <button type="button" class="cal-nav" onclick="calShiftMonth(1)">›</button>
            </div>
            <div class="cal-dow">
              <span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span><span>S</span>
            </div>
            <div class="cal-grid" id="cal-grid"></div>
            <button type="button" class="cal-today" onclick="calSelectToday()">Today</button>
          </div>
        </div>
        <div class="field">
          <label>Destination</label>
          <input type="text" id="cpm-dest" placeholder="e.g. AGP" maxlength="4" style="text-transform:uppercase">
        </div>
      </div>
      <div class="field">
        <label>SI / special remarks (optional)</label>
        <textarea id="cpm-si" rows="2" placeholder="e.g. TWO WHEELCHAIRS HOLD 1"></textarea>
      </div>

      <label class="check-row">
        <input type="checkbox" id="cpm-include-catering" onchange="refreshUldList()">
        Include catering-marked positions in the message
      </label>

      <div class="field">
        <label>ULD per position <span style="text-transform:none;font-weight:400;color:var(--text-dim);">— loaded positions only, Hold 5 bulk has none</span></label>
        <div class="uld-list" id="cpm-uld-list"></div>
      </div>

      <div class="btn-row" style="margin-top:0;">
        <button class="secondary-btn" onclick="clearCpmFields()">Clear all fields</button>
        <button class="secondary-btn" onclick="closeCpmModal()">Close window</button>
        <button class="primary-btn" onclick="generateCpm()">Generate CPM</button>
      </div>
    </div>

    <div id="cpm-result-view" style="display:none;">
      <div class="cpm-legend">B = Bags · C = Cargo · M = Mail · K = Catering (informational, non-standard)</div>
      <div id="cpm-readable"></div>
      <div class="field">
        <label>Raw message (editable)</label>
        <textarea id="cpm-raw" rows="10"></textarea>
      </div>
      <div class="btn-row">
        <button class="secondary-btn" onclick="backToCpmForm()">← Edit source data</button>
        <button class="secondary-btn" onclick="regenerateCpm()">Regenerate</button>
      </div>
      <div class="btn-row">
        <button class="primary-btn" onclick="copyCpmRaw()">Copy raw text</button>
      </div>
      <div class="copy-feedback" id="cpm-copy-feedback">Copied to clipboard ✓</div>
    </div>

  </div>
</div>

<script>
  // ---------------------------------------------------------------
  // Config
  // ---------------------------------------------------------------
  let currentAircraft = 'A390';

  const HOLD_DEFS = [
    {
      key: 'h1',
      title: 'HOLD 1',
      note: { A390: 'Sections 11–13 (A330-900 configuration)', A333: 'Sections 11–12 (A330-300 configuration)' },
      positions: {
        A390: ['11L','11P','11R','12L','12P','12R','13L','13R'],
        A333: ['11L','11P','11R','12L','12P','12R']
      }
    },
    {
      key: 'h2',
      title: 'HOLD 2',
      note: { A390: 'Sections 21–26 (standard fleet layout)', A333: 'Sections 21–26 (standard fleet layout)' },
      positions: {
        A390: ['21L','21P','21R','22L','22P','22R','23L','23P','23R','24L','24P','24R','25L','25R','26L','26R'],
        A333: ['21L','21P','21R','22L','22P','22R','23L','23P','23R','24L','24P','24R','25L','25R','26L','26R']
      }
    },
    {
      key: 'h3',
      title: 'HOLD 3',
      note: { A390: 'Sections 32–34 (A330-900 configuration)', A333: 'Sections 31–34 (A330-300 configuration)' },
      positions: {
        A390: ['32L','32P','32R','33L','33P','33R','34L','34R'],
        A333: ['31L','31P','31R','32L','32P','32R','33L','33P','33R','34L','34R']
      }
    },
    {
      key: 'h4',
      title: 'HOLD 4',
      note: { A390: 'Sections 41–43 (standard fleet layout)', A333: 'Sections 41–43 (standard fleet layout)' },
      positions: {
        A390: ['41L','41P','41R','42L','42P','42R','43L','43R'],
        A333: ['41L','41P','41R','42L','42P','42R','43L','43R']
      }
    },
    {
      key: 'h5',
      title: 'HOLD 5',
      note: { A390: 'Loose bulk compartment', A333: 'Loose bulk compartment' },
      positions: { A390: ['BULK'], A333: ['BULK'] },
      isBulk: true
    }
  ];

  // ---------------------------------------------------------------
  // Rendering
  // ---------------------------------------------------------------
  function pid(holdKey, code) { return holdKey + '-' + code.toLowerCase(); }

  function tileHTML(holdKey, code) {
    const id = pid(holdKey, code);
    return `
      <div class="tile" id="wrap-${id}">
        <div class="tile-head">
          <label id="lbl-${id}">${code} Bags</label>
          <span class="chip" id="calc-${id}">0 kg</span>
        </div>
        <input type="number" inputmode="decimal" id="${id}" placeholder="0" oninput="calculate()">
        <div class="mode-seg" id="seg-${id}">
          <button type="button" tabindex="-1" class="mode-btn active" data-mode="bags" onclick="setMode('${id}','bags')">Bags</button>
          <button type="button" tabindex="-1" class="mode-btn" data-mode="catering" onclick="setMode('${id}','catering')">Cat</button>
          <button type="button" tabindex="-1" class="mode-btn" data-mode="cargo" onclick="setMode('${id}','cargo')">Cargo</button>
          <button type="button" tabindex="-1" class="mode-btn" data-mode="mail" onclick="setMode('${id}','mail')">Mail</button>
        </div>
      </div>`;
  }

  function holdCardHTML(def) {
    const codes = def.positions[currentAircraft];
    const tiles = codes.map(c => tileHTML(def.key, c)).join('');
    return `
      <section class="hold-card" id="card-${def.key}">
        <div class="hold-head">
          <h2>${def.title}</h2>
          <span id="status-${def.key}" class="status-badge empty-badge">Empty</span>
        </div>
        <p class="hold-note" id="note-${def.key}">${def.note[currentAircraft]}</p>
        <div class="target-row">
          <label>Target loadsheet weight (kg)</label>
          <input type="number" inputmode="decimal" id="target-${def.key}" placeholder="0" oninput="calculate()">
        </div>
        <div class="tiles-grid" id="grid-${def.key}">
          ${tiles}
        </div>
        <div class="gauge-wrap">
          <div class="gauge-labels"><span>0 kg</span><span id="gauge-cap-${def.key}">Target</span></div>
          <div class="gauge">
            <div class="gauge-fill" id="gauge-fill-${def.key}"></div>
            <div class="gauge-target-mark" id="gauge-mark-${def.key}"></div>
          </div>
        </div>
      </section>`;
  }

  function renderHold(key) {
    const def = HOLD_DEFS.find(h => h.key === key);
    const old = document.getElementById('card-' + key);
    const wrapper = document.createElement('div');
    wrapper.innerHTML = holdCardHTML(def).trim();
    old.replaceWith(wrapper.firstChild);
  }

  function renderAll() {
    const root = document.getElementById('holds-root');
    root.innerHTML = HOLD_DEFS.map(holdCardHTML).join('');

    const nav = document.getElementById('hold-nav');
    nav.innerHTML = HOLD_DEFS.map(def => `
      <button class="nav-pill" onclick="scrollToHold('${def.key}')">
        <span class="nav-dot empty" id="dot-${def.key}"></span>${def.title.replace('HOLD ', 'H')}
      </button>`).join('');
  }

  function scrollToHold(key) {
    document.getElementById('card-' + key).scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // ---------------------------------------------------------------
  // Aircraft switching
  // ---------------------------------------------------------------
  function switchAircraft(type) {
    currentAircraft = type;
    document.getElementById('btn-A390').classList.toggle('active', type === 'A390');
    document.getElementById('btn-A333').classList.toggle('active', type === 'A333');
    // Only holds whose position layout changes need a rebuild; h2/h4/h5 stay put.
    renderHold('h1');
    renderHold('h3');
    calculate();
  }

  // ---------------------------------------------------------------
  // Mode (Bags / Catering / Cargo / Mail) selection
  // ---------------------------------------------------------------
  function setMode(id, mode) {
    const seg = document.getElementById('seg-' + id);
    if (!seg) return;
    seg.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));

    const input = document.getElementById(id);
    const label = document.getElementById('lbl-' + id);
    const wrap = document.getElementById('wrap-' + id);
    const code = id.split('-')[1].toUpperCase();

    wrap.classList.remove('type-catering', 'type-cargo', 'type-mail');

    if (mode === 'catering') {
      wrap.classList.add('type-catering');
      label.textContent = code + ' Catering WT';
      input.type = 'text';
      input.readOnly = true;
    } else {
      input.type = 'number';
      input.readOnly = false;
      if (typeof input.value === 'string' && input.value.includes('kg')) input.value = '';
      if (mode === 'bags') {
        label.textContent = code + ' Bags';
      } else if (mode === 'cargo') {
        wrap.classList.add('type-cargo');
        label.textContent = code + ' Cargo WT';
      } else if (mode === 'mail') {
        wrap.classList.add('type-mail');
        label.textContent = code + ' Mail WT';
      }
    }
    calculate();
  }

  function getActiveMode(id) {
    const seg = document.getElementById('seg-' + id);
    if (!seg) return 'bags';
    const active = seg.querySelector('.mode-btn.active');
    return active ? active.dataset.mode : 'bags';
  }

  // ---------------------------------------------------------------
  // Calculation
  // ---------------------------------------------------------------
  function getVal(id) {
    const el = document.getElementById(id);
    if (!el || el.value === '' || isNaN(el.value)) return 0;
    return parseFloat(el.value);
  }

  function updateStatus(badgeId, calculated, target) {
    const badge = document.getElementById(badgeId);
    if (!badge) return null;
    const diff = Math.round((calculated - target) * 100) / 100;
    if (target === 0 && calculated === 0) {
      badge.textContent = 'Empty';
      badge.className = 'status-badge empty-badge';
      return 'empty';
    } else if (diff === 0) {
      badge.textContent = 'MATCH · ' + calculated + ' kg';
      badge.className = 'status-badge match';
      return 'match';
    } else {
      badge.textContent = (diff > 0 ? '+' : '') + diff + ' kg diff';
      badge.className = 'status-badge mismatch';
      return 'mismatch';
    }
  }

  function updateGauge(key, calculated, target) {
    const fill = document.getElementById('gauge-fill-' + key);
    const mark = document.getElementById('gauge-mark-' + key);
    const cap = document.getElementById('gauge-cap-' + key);
    if (!fill) return;
    const scale = Math.max(target, calculated, 1) * 1.15;
    const fillPct = Math.min((calculated / scale) * 100, 100);
    const markPct = target > 0 ? Math.min((target / scale) * 100, 100) : 0;
    fill.style.width = fillPct + '%';
    mark.style.left = markPct + '%';
    fill.classList.remove('over', 'match');
    if (target > 0 && calculated === target) fill.classList.add('match');
    else if (target > 0 && calculated > target) fill.classList.add('over');
    cap.textContent = 'Target ' + target + ' kg';
  }

  function computeFlexibleHold(holdKey, codes, targetValue, isBulk) {
    let physicalSum = 0;
    let cateringIds = [];

    codes.forEach(code => {
      const id = pid(holdKey, code);
      const mode = getActiveMode(id);
      const rawVal = document.getElementById(id).value;
      let computed = 0;

      if (mode === 'catering') {
        cateringIds.push(id);
      } else {
        if (rawVal !== '' && !isNaN(rawVal) && parseFloat(rawVal) > 0) {
          const n = parseFloat(rawVal);
          if (mode === 'bags') {
            computed = isBulk ? (n * 13) : ((n * 13) + 65);
          } else if (mode === 'cargo' || mode === 'mail') {
            computed = n;
          }
        }
        physicalSum += computed;
        const chip = document.getElementById('calc-' + id);
        if (chip) chip.textContent = computed + ' kg';
      }
    });

    if (cateringIds.length > 0) {
      let cateringTotal = targetValue - physicalSum;
      if (cateringTotal < 0 || targetValue === 0) cateringTotal = 0;
      const split = Math.floor(cateringTotal / cateringIds.length);
      cateringIds.forEach(id => {
        document.getElementById(id).value = split + ' kg';
        const chip = document.getElementById('calc-' + id);
        if (chip) chip.textContent = split + ' kg';
      });
      return physicalSum + cateringTotal;
    }
    return physicalSum;
  }

  function calculate() {
    let grandCalc = 0, grandTarget = 0, anyEntered = false;

    HOLD_DEFS.forEach(def => {
      const codes = def.positions[currentAircraft];
      const target = getVal('target-' + def.key);
      const total = computeFlexibleHold(def.key, codes, target, !!def.isBulk);
      const state = updateStatus('status-' + def.key, total, target);
      updateGauge(def.key, total, target);

      const dot = document.getElementById('dot-' + def.key);
      if (dot) dot.className = 'nav-dot ' + (state === 'match' ? 'match' : state === 'empty' ? 'empty' : '');

      grandCalc += total;
      grandTarget += target;
      if (target !== 0 || total !== 0) anyEntered = true;
    });

    const grandBadge = document.getElementById('grand-status');
    if (!anyEntered) {
      grandBadge.textContent = '—';
      grandBadge.className = 'status-badge empty-badge';
    } else {
      const diff = Math.round((grandCalc - grandTarget) * 100) / 100;
      if (diff === 0) {
        grandBadge.textContent = 'MATCH · ' + grandCalc + ' kg';
        grandBadge.className = 'status-badge match';
      } else {
        grandBadge.textContent = (diff > 0 ? '+' : '') + diff + ' kg';
        grandBadge.className = 'status-badge mismatch';
      }
    }
  }

  function clearAll() {
    HOLD_DEFS.forEach(def => {
      document.getElementById('target-' + def.key).value = '';
      def.positions[currentAircraft].forEach(code => {
        const id = pid(def.key, code);
        setMode(id, 'bags');
        document.getElementById(id).value = '';
      });
    });
    calculate();
  }

  // ---------------------------------------------------------------
  // CPM generation
  // ---------------------------------------------------------------
  const CONTENT_CODE = { bags: 'B', cargo: 'C', mail: 'M', catering: 'K' };
  const CONTENT_LABEL = { bags: 'Bags', cargo: 'Cargo', mail: 'Mail', catering: 'Catering' };

  function computePositionWeight(id, mode) {
    const el = document.getElementById(id);
    if (!el) return 0;
    if (mode === 'catering') {
      const n = parseFloat((el.value || '').toString().replace('kg', '').trim());
      return isNaN(n) ? 0 : n;
    }
    const raw = el.value;
    if (raw === '' || isNaN(raw) || parseFloat(raw) <= 0) return 0;
    const n = parseFloat(raw);
    return mode === 'bags' ? (n * 13 + 65) : n; // cargo / mail = as entered
  }

  function getActivePositionsForCpm() {
    const includeCatering = document.getElementById('cpm-include-catering').checked;
    const rows = [];
    HOLD_DEFS.forEach(def => {
      if (def.isBulk) return; // Hold 5 loose bulk carries no ULD
      def.positions[currentAircraft].forEach(code => {
        const id = pid(def.key, code);
        const mode = getActiveMode(id);
        if (mode === 'catering' && !includeCatering) return;
        const weight = computePositionWeight(id, mode);
        if (weight > 0) rows.push({ id, code, mode, weight });
      });
    });
    return rows;
  }

  function refreshUldList() {
    const list = document.getElementById('cpm-uld-list');
    const rows = getActivePositionsForCpm();
    if (rows.length === 0) {
      list.innerHTML = '<div class="uld-empty">No loaded positions yet — enter weights in the reconciler above first.</div>';
      return;
    }
    list.innerHTML = rows.map(r => `
      <div class="uld-row">
        <div class="uld-row-head">
          <span>${r.code}</span>
          <span class="meta">${CONTENT_LABEL[r.mode]} · ${Math.round(r.weight)} kg</span>
        </div>
        <div class="uld-row-inputs">
          <input type="text" id="uld-type-${r.id}" placeholder="ULD type e.g. AKE">
          <input type="text" id="uld-num-${r.id}" placeholder="ULD number e.g. 12345LH">
        </div>
      </div>`).join('');
  }

  function openCpmModal() {
    document.getElementById('cpm-overlay').classList.add('open');
    document.getElementById('cpm-form-view').style.display = '';
    document.getElementById('cpm-result-view').style.display = 'none';
    if (!cpmSelectedDate) calSelectToday(true);
    refreshUldList();
  }

  function closeCpmModal() {
    document.getElementById('cpm-overlay').classList.remove('open');
    closeCalendar();
  }

  // ---------------------------------------------------------------
  // Custom calendar picker (avoids native date-input quirks entirely)
  // ---------------------------------------------------------------
  let cpmSelectedDate = null; // Date object once a date is picked
  let calViewYear, calViewMonth; // month currently shown in the dropdown
  let calOutsideClickHandler = null;

  function toggleCalendar() {
    const pop = document.getElementById('cpm-calendar');
    if (pop.classList.contains('open')) {
      closeCalendar();
    } else {
      const base = cpmSelectedDate || new Date();
      calViewYear = base.getFullYear();
      calViewMonth = base.getMonth();
      renderCalendar();

      const trigger = document.getElementById('cpm-date-trigger');
      const rect = trigger.getBoundingClientRect();
      const popWidth = 280;
      let left = rect.left;
      if (left + popWidth > window.innerWidth - 12) left = window.innerWidth - popWidth - 12;
      let top = rect.bottom + 6;
      const estPopHeight = 300;
      if (top + estPopHeight > window.innerHeight - 12) top = rect.top - estPopHeight - 6;
      pop.style.left = left + 'px';
      pop.style.top = top + 'px';

      pop.classList.add('open');
      trigger.classList.add('open');
      calOutsideClickHandler = function (e) {
        if (!pop.contains(e.target) && e.target.id !== 'cpm-date-trigger' && !trigger.contains(e.target)) {
          closeCalendar();
        }
      };
      setTimeout(() => document.addEventListener('click', calOutsideClickHandler), 0);
      const modalCard = document.querySelector('.modal-card');
      if (modalCard) modalCard.addEventListener('scroll', closeCalendar, { once: true });
    }
  }

  function closeCalendar() {
    const pop = document.getElementById('cpm-calendar');
    pop.classList.remove('open');
    document.getElementById('cpm-date-trigger').classList.remove('open');
    if (calOutsideClickHandler) {
      document.removeEventListener('click', calOutsideClickHandler);
      calOutsideClickHandler = null;
    }
  }

  function calShiftMonth(delta) {
    calViewMonth += delta;
    if (calViewMonth < 0) { calViewMonth = 11; calViewYear--; }
    if (calViewMonth > 11) { calViewMonth = 0; calViewYear++; }
    renderCalendar();
  }

  function renderCalendar() {
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    document.getElementById('cal-month-label').textContent = months[calViewMonth] + ' ' + calViewYear;

    const grid = document.getElementById('cal-grid');
    const firstOfMonth = new Date(calViewYear, calViewMonth, 1);
    // Monday-first weekday index (0=Mon ... 6=Sun)
    const startOffset = (firstOfMonth.getDay() + 6) % 7;
    const daysInMonth = new Date(calViewYear, calViewMonth + 1, 0).getDate();
    const daysInPrevMonth = new Date(calViewYear, calViewMonth, 0).getDate();

    const today = new Date();
    const cells = [];

    for (let i = 0; i < startOffset; i++) {
      const d = daysInPrevMonth - startOffset + i + 1;
      cells.push({ day: d, muted: true, y: calViewMonth === 0 ? calViewYear - 1 : calViewYear, m: calViewMonth === 0 ? 11 : calViewMonth - 1 });
    }
    for (let d = 1; d <= daysInMonth; d++) {
      cells.push({ day: d, muted: false, y: calViewYear, m: calViewMonth });
    }
    while (cells.length % 7 !== 0) {
      const d = cells.length - (startOffset + daysInMonth) + 1;
      cells.push({ day: d, muted: true, y: calViewMonth === 11 ? calViewYear + 1 : calViewYear, m: calViewMonth === 11 ? 0 : calViewMonth + 1 });
    }

    grid.innerHTML = cells.map(c => {
      const isToday = !c.muted && c.y === today.getFullYear() && c.m === today.getMonth() && c.day === today.getDate();
      const isSelected = cpmSelectedDate && c.y === cpmSelectedDate.getFullYear() && c.m === cpmSelectedDate.getMonth() && c.day === cpmSelectedDate.getDate();
      const cls = ['cal-day', c.muted ? 'muted' : '', isToday ? 'today' : '', isSelected ? 'selected' : ''].filter(Boolean).join(' ');
      return `<button type="button" class="${cls}" onclick="calSelectDay(${c.y},${c.m},${c.day})">${c.day}</button>`;
    }).join('');
  }

  function calSelectDay(y, m, d) {
    cpmSelectedDate = new Date(y, m, d);
    document.getElementById('cpm-date-display').textContent = formatDateDisplay(cpmSelectedDate);
    document.getElementById('cpm-date-display').classList.remove('placeholder');
    closeCalendar();
  }

  function calSelectToday(silent) {
    const t = new Date();
    cpmSelectedDate = new Date(t.getFullYear(), t.getMonth(), t.getDate());
    document.getElementById('cpm-date-display').textContent = formatDateDisplay(cpmSelectedDate);
    document.getElementById('cpm-date-display').classList.remove('placeholder');
    if (!silent) closeCalendar();
  }

  function formatDateDisplay(d) {
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return String(d.getDate()).padStart(2, '0') + ' ' + months[d.getMonth()] + ' ' + d.getFullYear();
  }

  function formatCpmDate() {
    const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
    if (!cpmSelectedDate) return 'DDMON';
    return String(cpmSelectedDate.getDate()).padStart(2, '0') + months[cpmSelectedDate.getMonth()];
  }

  function buildCpmData() {
    const flight = (document.getElementById('cpm-flight').value || 'FLTNBR').trim().toUpperCase();
    const reg = (document.getElementById('cpm-reg').value || 'REG').trim().toUpperCase();
    const dest = (document.getElementById('cpm-dest').value || 'DEST').trim().toUpperCase();
    const si = document.getElementById('cpm-si').value.trim();
    const dateCode = formatCpmDate();
    const rows = getActivePositionsForCpm();

    let raw = `CPM ${flight}/${dateCode}.${reg}`;
    const readableRows = [];

    rows.forEach(r => {
      const uldType = (document.getElementById('uld-type-' + r.id)?.value || '').trim().toUpperCase();
      const uldNum = (document.getElementById('uld-num-' + r.id)?.value || '').trim().toUpperCase();
      const uld = (uldType + uldNum) || 'NIL';
      const code = CONTENT_CODE[r.mode];
      const weight = Math.round(r.weight);
      raw += `\n-${r.code}/${uld}/${dest}/${weight}/${code}`;
      readableRows.push({ pos: r.code, content: CONTENT_LABEL[r.mode], uld, weight, dest });
    });

    if (si) raw += `\nSI ${si.toUpperCase()}`;

    return { raw, readableRows, totalWeight: rows.reduce((s, r) => s + r.weight, 0) };
  }

  function renderReadable(data) {
    const box = document.getElementById('cpm-readable');
    if (data.readableRows.length === 0) {
      box.innerHTML = '<p class="uld-empty">No loaded positions were included.</p>';
      return;
    }
    box.innerHTML = `
      <table class="readable-table">
        <thead><tr><th>Pos</th><th>Content</th><th>ULD</th><th>Wt</th><th>Dest</th></tr></thead>
        <tbody>
          ${data.readableRows.map(r => `<tr><td>${r.pos}</td><td>${r.content}</td><td>${r.uld}</td><td>${Math.round(r.weight)} kg</td><td>${r.dest}</td></tr>`).join('')}
        </tbody>
      </table>
      <div class="cpm-total">Total: ${Math.round(data.totalWeight)} kg across ${data.readableRows.length} position${data.readableRows.length === 1 ? '' : 's'}</div>`;
  }

  function generateCpm() {
    const data = buildCpmData();
    renderReadable(data);
    document.getElementById('cpm-raw').value = data.raw;
    document.getElementById('cpm-form-view').style.display = 'none';
    document.getElementById('cpm-result-view').style.display = '';
  }

  function clearCpmFields() {
    document.getElementById('cpm-flight').value = '';
    document.getElementById('cpm-reg').value = '';
    document.getElementById('cpm-dest').value = '';
    document.getElementById('cpm-si').value = '';
    document.getElementById('cpm-include-catering').checked = false;
    cpmSelectedDate = null;
    const disp = document.getElementById('cpm-date-display');
    disp.textContent = 'Select date';
    disp.classList.add('placeholder');
    refreshUldList(); // rebuilds the ULD rows fresh, wiping any typed type/number values
  }

  function regenerateCpm() {
    if (document.getElementById('cpm-raw').value.trim() !== '' &&
        !confirm('This will overwrite any manual edits to the raw message with a fresh version built from the source data. Continue?')) {
      return;
    }
    const data = buildCpmData();
    renderReadable(data);
    document.getElementById('cpm-raw').value = data.raw;
  }

  function backToCpmForm() {
    document.getElementById('cpm-form-view').style.display = '';
    document.getElementById('cpm-result-view').style.display = 'none';
    refreshUldList();
  }

  function copyCpmRaw() {
    const ta = document.getElementById('cpm-raw');
    ta.focus();
    ta.select();
    ta.setSelectionRange(0, ta.value.length);
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(ta.value);
      } else {
        document.execCommand('copy');
      }
    } catch (e) {
      try { document.execCommand('copy'); } catch (e2) { /* selection remains for manual copy */ }
    }
    const fb = document.getElementById('cpm-copy-feedback');
    fb.classList.add('show');
    setTimeout(() => fb.classList.remove('show'), 1600);
  }

  // ---------------------------------------------------------------
  // Init
  // ---------------------------------------------------------------
  renderAll();
  calculate();
</script>
</body>
</html>
